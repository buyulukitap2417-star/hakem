<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hakem Sahası | SDÜ Oryantiring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 500; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .modal.active { display: flex; }
        .mic-on { background: #ef4444 !important; animation: pulse 1.5s infinite; border-color: #ef4444 !important; }
        .spk-on { background: #2563eb !important; border-color: #2563eb !important; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body class="p-6 text-center">

    <audio id="remoteAudio" autoplay class="hidden"></audio>

    <div id="loginUI" class="fixed inset-0 z-[300] flex items-center justify-center bg-slate-950 px-6 text-white text-center">
        <div class="max-w-md w-full glass p-10 rounded-[3rem] border-t-4 border-emerald-500 shadow-2xl">
            <h1 class="text-2xl font-black uppercase mb-8 tracking-tighter">HAKEM GİRİŞİ</h1>
            <input type="text" id="refCode" placeholder="GİRİŞ KODU" class="w-full bg-black/40 border border-white/10 rounded-2xl py-5 px-6 text-center text-xl font-bold outline-none uppercase text-emerald-500 mb-6 focus:border-emerald-500 transition-all">
            <button onclick="login()" class="w-full py-5 bg-emerald-600 text-white rounded-2xl font-black uppercase tracking-widest shadow-lg active:scale-95 transition-all">SİSTEME GİR</button>
        </div>
    </div>

    <div id="dashUI" class="hidden space-y-6 pb-24 text-left">
        <header class="flex justify-between items-center glass p-5 rounded-3xl border border-white/10">
            <div><h2 id="refN" class="text-sm font-black uppercase">---</h2><p class="text-[9px] text-emerald-500 font-bold uppercase tracking-widest">GÖREVLİ HAKEM</p></div>
            <div class="flex gap-2">
                <button onclick="openRiddleAuth()" class="flex items-center gap-2 p-3 bg-blue-500/10 text-blue-400 rounded-xl font-bold text-[10px] uppercase tracking-widest hover:bg-blue-500/20 transition-colors" title="Bilmece Cevabı"><i data-lucide="key" class="w-4 h-4"></i><span class="hidden sm:inline">Cevap</span></button>
                <button onclick="logout()" class="p-3 bg-red-500/10 text-red-500 rounded-xl hover:bg-red-500/20 transition-colors"><i data-lucide="log-out"></i></button>
            </div>
        </header>

        <div class="space-y-4">
            <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] ml-2">Yarışmacı Listesi</h3>
            <div id="teamList" class="space-y-3"></div>
        </div>
    </div>

    <!-- RAPOR POPUP -->
    <div id="reportModal" class="modal">
        <div class="glass w-full max-w-md p-8 rounded-[3rem] border-t-4 border-emerald-500 shadow-3xl space-y-6">
            <h3 id="targetTeam" class="text-xl font-black uppercase text-center tracking-tighter text-white">---</h3>
            <div class="space-y-4">
                <div class="flex items-center justify-between p-4 glass rounded-2xl text-white"><span>Takım Vardı mı?</span><input type="checkbox" id="checkArrived" class="w-6 h-6 accent-emerald-500"></div>
                <div class="flex items-center justify-between p-4 glass rounded-2xl text-white"><span>Görev Başarılı mı?</span><input type="checkbox" id="checkSuccess" class="w-6 h-6 accent-emerald-500"></div>
                <textarea id="reportNote" placeholder="Ekstra hakem notları..." class="w-full h-28 bg-black/40 border border-white/10 rounded-2xl p-4 text-sm outline-none focus:border-emerald-500 text-white"></textarea>
            </div>
            <div class="flex gap-3 pt-2">
                <button onclick="closeReport()" class="flex-1 py-4 glass rounded-2xl font-bold uppercase text-xs text-white">VAZGEÇ</button>
                <button onclick="submitReport()" class="flex-1 py-4 bg-emerald-600 text-white rounded-2xl font-black uppercase text-xs shadow-lg active:scale-95 transition-all">GÖNDER</button>
            </div>
        </div>
    </div>

    <!-- BİLMECE DOĞRULAMA MODALI -->
    <div id="riddleAuthModal" class="modal">
        <div class="glass w-full max-w-sm p-8 rounded-[3rem] border-t-4 border-blue-500 shadow-3xl text-center space-y-6">
            <div class="w-16 h-16 bg-blue-500/10 rounded-full flex items-center justify-center mx-auto text-blue-500 mb-4"><i data-lucide="lock" class="w-8 h-8"></i></div>
            <h3 class="text-sm font-black uppercase text-slate-300 leading-relaxed">Bulmacanın cevabını görmek için hakem şifreni gir</h3>
            <input type="password" id="riddlePwdInput" placeholder="ŞİFRE" class="w-full bg-black/40 border border-white/10 rounded-2xl py-4 text-center text-lg font-bold outline-none uppercase text-blue-400 focus:border-blue-500 transition-all">
            <div class="flex gap-3 pt-2">
                <button onclick="closeRiddleAuth()" class="flex-1 py-4 glass rounded-2xl font-bold uppercase text-xs text-white">VAZGEÇ</button>
                <button onclick="verifyRiddleCode()" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-black uppercase text-xs shadow-lg active:scale-95 transition-all">ONAYLA</button>
            </div>
        </div>
    </div>

    <!-- BİLMECE CEVABI GÖSTERİM MODALI -->
    <div id="riddleAnswerModal" class="modal">
        <div class="glass w-full max-w-md p-10 rounded-[3.5rem] border-t-4 border-emerald-500 shadow-3xl text-center space-y-6 relative">
            <button onclick="closeRiddleAnswer()" class="absolute top-6 right-6 p-2 text-slate-500 hover:text-white transition-colors"><i data-lucide="x"></i></button>
            <div class="w-20 h-20 bg-emerald-500/10 rounded-full flex items-center justify-center mx-auto text-emerald-500 mb-2"><i data-lucide="lightbulb" class="w-10 h-10"></i></div>
            <h3 class="text-[10px] font-black uppercase text-emerald-500 tracking-widest">KONTROL NOKTASI CEVABI</h3>
            <p id="riddleAnswerText" class="text-2xl font-black text-white italic leading-relaxed py-4"></p>
            <button onclick="closeRiddleAnswer()" class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-black uppercase text-xs shadow-lg active:scale-95 transition-all">ANLADIM</button>
        </div>
    </div>

    <div id="voiceUI" class="hidden fixed bottom-6 right-6 flex flex-col gap-3">
        <button id="spkBtn" onclick="toggleSpk()" class="p-5 glass rounded-[1.5rem] border-2 border-white/10 shadow-3xl transition-all"><i data-lucide="volume-x" id="spkIcon" class="text-white"></i></button>
        <button id="micBtn" onclick="toggleMic()" class="p-5 glass rounded-[1.5rem] border-2 border-white/10 shadow-3xl transition-all"><i data-lucide="mic-off" id="micIcon" class="text-white"></i></button>
    </div>

    <script>
        const SUPABASE_URL = 'https://hxdmiamcednlzoklkxnu.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_2lmWYp5Pkvn_BsADVHPKug_KK9n8v2-';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let ref = null, selectedId = null, peer = null, myStream = null, micOn = false, spkOn = false;
        let callRetryTimeout = null;
        let adminDataConn = null;

        window.onload = () => { 
            lucide.createIcons();
            const saved = localStorage.getItem('sdu_ref_code');
            if(saved) { document.getElementById('refCode').value = saved; login(); } 
        };

        async function login() {
            const code = document.getElementById('refCode').value.trim().toUpperCase(); if(!code) return;
            const { data } = await supabaseClient.from('referees').select('*').eq('code', code).single();
            if(data) {
                ref = data; localStorage.setItem('sdu_ref_code', code);
                document.getElementById('refN').innerText = ref.name;
                document.getElementById('loginUI').classList.add('hidden'); document.getElementById('dashUI').classList.remove('hidden'); document.getElementById('voiceUI').classList.remove('hidden');
                fetchTeams(); startVoice(); startGPS();
            } else alert("Hatalı Kod!");
        }

        async function fetchTeams() {
            const { data } = await supabaseClient.from('registrations').select('*').order('team_name');
            const list = document.getElementById('teamList');
            list.innerHTML = data.map(t => `
                <div class="glass p-5 rounded-[2rem] flex justify-between items-center active:scale-[0.98] transition-transform" onclick="openReport('${t.id}','${t.team_name}')">
                    <div><h4 class="font-black text-sm uppercase">${t.team_name}</h4><p class="text-[9px] text-slate-500 uppercase mt-1 tracking-widest font-bold">${t.is_timer_running?'YARIŞIYOR':'DURDU'}</p></div>
                    <div class="p-3 bg-emerald-500/10 rounded-xl"><i data-lucide="file-text" class="w-4 h-4 text-emerald-500"></i></div>
                </div>`).join('');
            lucide.createIcons();
        }

        function openReport(id, name) { selectedId = id; document.getElementById('targetTeam').innerText = name; document.getElementById('reportModal').classList.add('active'); }
        function closeReport() { document.getElementById('reportModal').classList.remove('active'); }
        async function submitReport() {
            const up = { referee_id: ref.id, team_id: selectedId, arrived: document.getElementById('checkArrived').checked, success: document.getElementById('checkSuccess').checked, notes: document.getElementById('reportNote').value };
            const { error } = await supabaseClient.from('referee_reports').insert(up);
            if(!error) { alert("Rapor merkeze iletildi!"); closeReport(); fetchTeams(); }
            else alert("Hata oluştu!");
        }

        function startGPS() { navigator.geolocation.watchPosition(async (pos) => { await supabaseClient.from('referees').update({last_lat:pos.coords.latitude, last_lng:pos.coords.longitude}).eq('id',ref.id); }, null, {enableHighAccuracy: true}); }

        // --- BİLMECE ŞİFRE FONKSİYONLARI ---
        function openRiddleAuth() {
            document.getElementById('riddlePwdInput').value = '';
            document.getElementById('riddleAuthModal').classList.add('active');
            document.getElementById('riddlePwdInput').focus();
        }
        
        function closeRiddleAuth() { document.getElementById('riddleAuthModal').classList.remove('active'); }
        
        function verifyRiddleCode() {
            const input = document.getElementById('riddlePwdInput').value.trim().toUpperCase();
            if(input === ref.code) {
                closeRiddleAuth();
                document.getElementById('riddleAnswerText').innerText = ref.riddle_answer || "Bu nokta için henüz bir cevap tanımlanmadı.";
                document.getElementById('riddleAnswerModal').classList.add('active');
            } else {
                alert("Hatalı Şifre!");
            }
        }
        
        function closeRiddleAnswer() { document.getElementById('riddleAnswerModal').classList.remove('active'); }

        // --- SES SİSTEMİ (DOKUNULMADI) ---
        async function startVoice() {
            if (peer) { peer.disconnect(); peer.destroy(); }
            peer = new Peer('SDU_REF_' + ref.id.substring(0,8), {
                config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }
            });
            
            peer.on('open', async () => {
                adminDataConn = peer.connect('SDU_ADMIN_2026_VOICE');
                try {
                    myStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    myStream.getAudioTracks()[0].enabled = micOn;
                    makeCall();
                } catch(e) { console.error("Mic access denied"); }
            });

            peer.on('disconnected', () => { if(!peer.destroyed) peer.reconnect(); });
        }

        function makeCall() {
            if (!myStream || !peer || !peer.open) return;
            const call = peer.call('SDU_ADMIN_2026_VOICE', myStream);
            if(!call) return;

            call.on('stream', (rs) => { 
                const ra = document.getElementById('remoteAudio');
                ra.srcObject = rs; ra.muted = !spkOn;
            });

            call.on('close', () => {
                clearTimeout(callRetryTimeout);
                callRetryTimeout = setTimeout(makeCall, 3000);
            });
            
            call.on('error', () => {
                clearTimeout(callRetryTimeout);
                callRetryTimeout = setTimeout(makeCall, 3000);
            });

            if(call.peerConnection) {
                call.peerConnection.addEventListener('iceconnectionstatechange', () => {
                    const state = call.peerConnection.iceConnectionState;
                    if(state === 'disconnected' || state === 'failed' || state === 'closed') {
                        call.close();
                    }
                });
            }
        }

        function toggleMic() { 
            if(!myStream) return; 
            micOn = !micOn; 
            myStream.getAudioTracks()[0].enabled = micOn; 
            upUI(); 
            if(adminDataConn && adminDataConn.open) {
                adminDataConn.send({ type: 'MIC_STATUS', state: micOn });
            }
        }
        function toggleSpk() { spkOn = !spkOn; document.getElementById('remoteAudio').muted = !spkOn; upUI(); }
        
        function upUI() {
            document.getElementById('micBtn').className = micOn ? "p-5 glass rounded-[1.5rem] border-2 border-red-500 mic-on shadow-lg" : "p-5 glass rounded-[1.5rem] border-2 border-white/10";
            document.getElementById('micIcon').setAttribute('data-lucide', micOn ? 'mic' : 'mic-off');
            document.getElementById('spkBtn').className = spkOn ? "p-5 glass rounded-[1.5rem] border-2 border-blue-500 spk-on shadow-lg" : "p-5 glass rounded-[1.5rem] border-2 border-white/10";
            document.getElementById('spkIcon').setAttribute('data-lucide', spkOn ? 'volume-2' : 'volume-x');
            lucide.createIcons();
        }

        function logout() { localStorage.removeItem('sdu_ref_code'); location.reload(); }
    </script>
</body>
</html>
